name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - 'apps/client/**'
      - 'apps/server/**'
      - 'packages/shared/**'
      - 'patches/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/publish-docker.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [client, server]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read app version
        id: version
        run: echo "version=$(node -p "require('./apps/${{ matrix.app }}/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # The version tag existing on Docker Hub means this version was already
      # published — only a version bump (or a failed previous run) triggers a push.
      - name: Check whether this version is already published
        id: published
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/polka-${{ matrix.app }}:${{ steps.version.outputs.version }}"
          if docker manifest inspect "$image" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$image already exists — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.published.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.published.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/polka-${{ matrix.app }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/polka-${{ matrix.app }}:latest
          cache-from: type=gha,scope=polka-${{ matrix.app }}
          cache-to: type=gha,scope=polka-${{ matrix.app }},mode=max
