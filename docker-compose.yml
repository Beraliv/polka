services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      PROGRESS_PATH: "/data/progress"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-}"
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - progress_data:/data/progress
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  progress_data:
